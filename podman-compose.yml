# Podman Compose file for Futuristic Inventory Management System
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_DB: Inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inventory_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: inventory_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - inventory_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/Inventory
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3051
    ports:
      - "3051:3051"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - inventory_network
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3051
      NEXT_PUBLIC_WS_URL: ws://localhost:3051
    ports:
      - "3052:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - inventory_network
    command: npm run dev

  # ML Prediction Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: inventory_ml
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/Inventory
      REDIS_URL: redis://redis:6379
    ports:
      - "3053:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./ml-service:/app
    networks:
      - inventory_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:

networks:
  inventory_network:
    driver: bridge
